name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job de test et build du backend Java/Spring Boot
  backend:
    name: Backend Gradle build + tests + SonarCloud
    runs-on: ubuntu-latest  # Exécution sur Ubuntu dernière version
    strategy:
      fail-fast: true  # Arrêter immédiatement si une étape échoue
    
    steps:
      # Récupération du code source depuis le repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configuration de l'environnement Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin  # Utilisation d'Eclipse Temurin (OpenJDK)
          java-version: '17'

      # Mise en cache des dépendances Gradle pour accélérer les builds
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/build.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Exécution des tests unitaires et génération des rapports de couverture
      - name: Run backend tests and generate coverage
        run: |
          chmod +x ./gradlew  # Rendre le script Gradle exécutable
          ./gradlew clean test jacocoTestReport --no-daemon  # Tests + couverture JaCoCo

      # Vérification explicite de la réussite des tests (point de blocage du déploiement)
      - name: Verify tests passed
        if: success()
        run: echo "✅ Tests réussis - Le déploiement peut procéder"

      # Vérification d'échec des tests (point de blocage du déploiement)
      - name: Tests failed - Block deployment
        if: failure()
        run: |
          echo "❌ Les tests ont échoué!"
          echo "Le déploiement est BLOQUÉ jusqu'à la correction des tests."
          exit 1

      # Build du backend (JAR)
      - name: Build backend JAR
        run: ./gradlew build -x test --no-daemon

      # Upload des rapports de couverture pour visualisation dans GitHub
      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: build/reports/jacoco/test

      # Upload du JAR compilé pour utilisation dans le deploy
      - name: Upload backend JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: build/libs/microcrm-0.0.1-SNAPSHOT.jar
          retention-days: 1  # Garder seulement 1 jour, c'est temporaire

      # Analyse de qualité du code avec SonarCloud
      - name: SonarCloud Scan for Backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Token GitHub pour l'intégration
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # Token SonarCloud pour l'analyse
        run: ./gradlew sonar --no-daemon  # Exécution de l'analyse SonarQube

  # Étape de déploiement continu (CD) - Construction et publication de l'image Docker backend
  deploy:
    name: Build and Deploy Backend Docker Image
    runs-on: ubuntu-latest
    needs: backend
    # Condition : uniquement sur push vers main, pas sur les pull requests
    # ET le job backend doit avoir réussi (tests + build passants)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.backend.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Téléchargement du JAR backend compilé
      - name: Download backend JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: .

      # Configuration de Docker Buildx pour le multi-plateforme
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authentification auprès du GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT_P9 }}

      # Extraction des métadonnées pour le tagging automatique des images
      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # Construction et publication de l'image Docker
      - name: Build and push Docker image from pre-compiled artifact
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.deploy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
